<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图书馆座位预约 — 首页</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
<body>
  <div class="app-container">
    <!-- 顶部栏 -->
    <div class="user-top-bar">
      <div class="app-logo">📚 座位预约</div>
      <div class="user-info">
        <span class="user-name">学生 A</span>
        <span style="font-size:12px;color:#2563EB;cursor:pointer;">切换</span>
        <a href="admin/login.html" style="font-size:12px;color:#64748B;text-decoration:none;margin-left:4px;">管理</a>
      </div>
    </div>

    <!-- 页面标题 -->
    <div class="page-header">
      <h1>欢迎回来</h1>
      <div class="subtitle">今天图书馆座位使用情况</div>
    </div>

    <!-- 主要内容 -->
    <div class="px-3 py-3">

      <!-- 统计卡片 -->
      <div class="row g-2 mb-3">
        <div class="col-4">
          <div class="stat-card">
            <div class="stat-number">42</div>
            <div class="stat-label">总座位</div>
          </div>
        </div>
        <div class="col-4">
          <div class="stat-card">
            <div class="stat-number" style="color:#16A34A;">18</div>
            <div class="stat-label">空闲中</div>
          </div>
        </div>
        <div class="col-4">
          <div class="stat-card">
            <div class="stat-number" style="color:#F59E0B;">24</div>
            <div class="stat-label">今日预约</div>
          </div>
        </div>
      </div>

      <!-- 快捷入口 -->
      <div class="row g-2 mb-4">
        <div class="col-6">
          <a href="seats.html" class="quick-entry" style="background-color:#2563EB;color:#fff;">
            🪑 预约座位
          </a>
        </div>
        <div class="col-6">
          <a href="my-reservations.html" class="quick-entry">
            📋 我的预约
          </a>
        </div>
      </div>

      <!-- 当前占用概览 -->
      <h6 class="fw-bold mb-2" style="font-size:14px;">各楼层占用情况</h6>
      <div class="card-custom">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <span class="fw-bold">2 楼 · 自习区</span>
          <span style="font-size:12px;color:#16A34A;">8/12 空闲</span>
        </div>
        <div style="height:6px;background:#E2E8F0;border-radius:3px;overflow:hidden;">
          <div style="height:100%;width:33%;background:#2563EB;border-radius:3px;"></div>
        </div>
      </div>
      <div class="card-custom">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <span class="fw-bold">3 楼 · 自习区</span>
          <span style="font-size:12px;color:#16A34A;">6/15 空闲</span>
        </div>
        <div style="height:6px;background:#E2E8F0;border-radius:3px;overflow:hidden;">
          <div style="height:100%;width:60%;background:#F59E0B;border-radius:3px;"></div>
        </div>
      </div>
      <div class="card-custom">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <span class="fw-bold">4 楼 · 电子阅览区</span>
          <span style="font-size:12px;color:#64748B;">4/8 空闲</span>
        </div>
        <div style="height:6px;background:#E2E8F0;border-radius:3px;overflow:hidden;">
          <div style="height:100%;width:50%;background:#F59E0B;border-radius:3px;"></div>
        </div>
      </div>

      <!-- 安全留白 -->
      <div class="safe-bottom"></div>
    </div>

    <!-- 底部 Tab 栏 -->
    <div class="bottom-tab-bar">
      <a href="index.html" class="tab-item active">
        <span class="tab-icon">🏠</span>
        <span>首页</span>
      </a>
      <a href="seats.html" class="tab-item">
        <span class="tab-icon">🪑</span>
        <span>座位列表</span>
      </a>
      <a href="my-reservations.html" class="tab-item">
        <span class="tab-icon">📋</span>
        <span>我的预约</span>
      </a>
    </div>
  </div>
</body>
</html>
