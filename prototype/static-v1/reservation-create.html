<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>预约提交 — 图书馆座位预约</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
<body>
  <div class="app-container">
    <!-- 顶部栏 -->
    <div class="user-top-bar">
      <div class="app-logo">📚 座位预约</div>
      <div class="user-info">
        <span class="user-name">学生 A</span>
        <span style="font-size:12px;color:#2563EB;cursor:pointer;">切换</span>
        <a href="admin/login.html" style="font-size:12px;color:#64748B;text-decoration:none;margin-left:4px;">管理</a>
      </div>
    </div>

    <!-- 返回上一页 -->
    <div style="padding:8px 16px;border-bottom:1px solid #E2E8F0;background:#fff;">
      <a href="seat-detail.html" style="color:#64748B;text-decoration:none;font-size:14px;">&larr; 返回座位详情</a>
    </div>

    <!-- 页面标题 -->
    <div class="page-header">
      <h1>提交预约</h1>
      <div class="subtitle">选择日期和时段完成预约</div>
    </div>

    <!-- 主要内容 -->
    <div class="px-3 py-3">

      <!-- 【异常状态演示】冲突提示 -->
      <div class="alert-custom alert-danger">
        该时段已被预约，请重新选择。
      </div>

      <!-- 座位摘要 -->
      <div class="card-custom" style="background:#F8FAFC;">
        <div class="d-flex justify-content-between">
          <div>
            <div class="fw-bold">A-01</div>
            <div style="font-size:12px;color:#64748B;">4 楼 · 电子阅览区 · 靠窗</div>
          </div>
          <span class="badge-status available">空闲</span>
        </div>
      </div>

      <!-- 日期选择 -->
      <div class="mb-3">
        <label class="form-label fw-bold" style="font-size:14px;">选择日期</label>
        <input type="date" class="form-input-custom" value="2026-07-07">
      </div>

      <!-- 时段选择 -->
      <div class="mb-3">
        <label class="form-label fw-bold" style="font-size:14px;">选择时段</label>
        <div style="font-size:12px;color:#64748B;margin-bottom:8px;">可选择一个或多个连续时段（图书馆开放 08:00-22:00）</div>
        <div class="slot-grid">
          <div class="slot-item selected">08-09</div>
          <div class="slot-item selected">09-10</div>
          <div class="slot-item selected">10-11</div>
          <div class="slot-item">11-12</div>
          <div class="slot-item">12-13</div>
          <div class="slot-item">13-14</div>
          <div class="slot-item">14-15</div>
          <div class="slot-item">15-16</div>
          <div class="slot-item occupied">16-17</div>
          <div class="slot-item occupied">17-18</div>
          <div class="slot-item">18-19</div>
          <div class="slot-item">19-20</div>
          <div class="slot-item">20-21</div>
          <div class="slot-item">21-22</div>
        </div>
        <div style="font-size:12px;color:#64748B;margin-top:8px;">
          已选：08:00 - 11:00（3 小时）
        </div>
      </div>

      <!-- 提交按钮 -->
      <button class="btn btn-primary-custom w-100 mb-2" onclick="alert('预约提交成功！')">
        提交预约
      </button>

      <button class="btn btn-outline-custom w-100" onclick="location.href='seat-detail.html'">
        取消
      </button>

      <div class="safe-bottom"></div>
    </div>

    <!-- 底部 Tab 栏 -->
    <div class="bottom-tab-bar">
      <a href="index.html" class="tab-item">
        <span class="tab-icon">🏠</span>
        <span>首页</span>
      </a>
      <a href="seats.html" class="tab-item active">
        <span class="tab-icon">🪑</span>
        <span>座位列表</span>
      </a>
      <a href="my-reservations.html" class="tab-item">
        <span class="tab-icon">📋</span>
        <span>我的预约</span>
      </a>
    </div>
  </div>
</body>
</html>
