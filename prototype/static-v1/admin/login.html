<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员登录 — 图书馆座位预约</title>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #F8FAFC; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 16px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">📚 图书馆座位预约</div>

    <!-- 【异常状态演示】错误提示 -->
    <div class="alert-custom alert-danger" id="error-msg">
      用户名或密码错误，请重试。
    </div>

    <form onsubmit="alert('登录成功！即将跳转到管理后台。');location.href='reservations.html';return false;">
      <div class="mb-3">
        <label class="form-label fw-bold" style="font-size:14px;">用户名</label>
        <input type="text" class="form-input-custom" placeholder="请输入用户名" value="admin">
      </div>
      <div class="mb-4">
        <label class="form-label fw-bold" style="font-size:14px;">密码</label>
        <input type="password" class="form-input-custom is-invalid" placeholder="请输入密码" value="wrong">
        <div style="font-size:12px;color:#DC2626;margin-top:4px;">密码错误</div>
      </div>
      <button type="submit" class="btn btn-primary-custom w-100">登录</button>
    </form>

    <div style="text-align:center;margin-top:16px;">
      <a href="../seats.html" style="font-size:13px;color:#64748B;text-decoration:none;">← 返回用户端</a>
    </div>
  </div>
</body>
</html>
